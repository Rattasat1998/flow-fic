name: Performance Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  route-budgets:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Check route bundle budgets
        run: npm run perf:budgets
